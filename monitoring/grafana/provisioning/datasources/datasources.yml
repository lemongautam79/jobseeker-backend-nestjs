apiVersion: 1

jsonData:
  tracesToLogsV2:
    datasourceUid: loki

    tags:
      - key: service.name
        value: service_name

    filterByTraceID: true
    filterBySpanID: true

  serviceMap:
    datasourceUid: prometheus

  nodeGraph:
    enabled: true

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200

    jsonData:
      httpMethod: GET

      tracesToLogsV2:
        datasourceUid: loki

      serviceMap:
        datasourceUid: prometheus

      nodeGraph:
        enabled: true

      search:
        hide: false