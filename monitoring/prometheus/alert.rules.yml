groups:
  - name: node_alerts
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage on {{ $labels.instance }} is above 80%"

      - alert: NodeDown
        expr: up{job="node"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node Exporter is down"
          description: "Node exporter on {{ $labels.instance }} is not reachable"

  - name: nestjs_alerts
    rules:
      - alert: NestJSDown
        expr: up{job="nestjs"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "NestJS service is down"
          description: "NestJS metrics endpoint is unreachable"