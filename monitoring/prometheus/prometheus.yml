global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: jobseeker
    environment: development

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: "nestjs"
    metrics_path: "/api/metrics"  
    static_configs:
      - targets:
          - backend:7000
        labels:
          app: jobseeker
          environment: development

  - job_name: "prometheus"
    static_configs:
      - targets: 
        - localhost:9090
        labels:
          app: infrastructure

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          app: infrastructure

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          app: infrastructure
