global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "nestjs"
    metrics_path: /api/metrics

    static_configs:
      - targets:
          - backend:7000

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: "cadvisor"
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090