server {
    listen 80;
    server_name api.jobseeker.lemongautam.com.np;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;

    server_name api.jobseeker.lemongautam.com.np;

    ssl_certificate /etc/letsencrypt/live/api.jobseeker.lemongautam.com.np/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.jobseeker.lemongautam.com.np/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://backend:7000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}